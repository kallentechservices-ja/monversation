backend:
  name: github
  repo: kallentechservices-ja/manversation # Replace this with your actual repo!
  branch: main

media_folder: "images/uploads" # Where photos go when your dad uploads them
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "posts" # Where the text files will sit
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Cover Image", name: "image", widget: "image"}
      - {label: "Teaser Text", name: "teaser", widget: "text"}
      - {label: "Body (The Script)", name: "body", widget: "markdown"}
